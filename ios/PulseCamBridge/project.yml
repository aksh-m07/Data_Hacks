name: PulseCamBridge
options:
  minimumXcodeGenVersion: 2.38.0
targets:
  PulseCamBridge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PulseCamBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.groundzero.pulsecambridge
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSMainCameraUsageDescription: Needed to measure pulse using rear camera and flashlight.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Not used.
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: YES
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLName: com.groundzero.pulsecambridge
            CFBundleURLSchemes:
              - groundzero-pulse
